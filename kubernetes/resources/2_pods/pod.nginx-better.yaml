apiVersion: v1
kind: Pod
metadata:
  name: nginx-better
  namespace: namespace-files
  labels:
    app: nginx
spec:
  containers:
  - name: nginx-better
    image: cgr.dev/chainguard/nginx:latest
    ports:
      - containerPort: 8080
        protocol: TCP
    readinessProbe:
      httpGet:
        path: /
        port: 8080
    livenessProbe:
      httpGet:
        path: /
        port: 8080
    resources:
      limits:
        memory: "50Mi"
        cpu: "250m"
      requests:
        memory: "25Mi"
        cpu: "250m"
    securityContext:
      allowPrivilegeEscalation: false
      privileged: false
  securityContext:
    seccompProfile: #secure computing mode to default container
      type: RuntimeDefault
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
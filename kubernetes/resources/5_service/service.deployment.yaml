apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-minimal
  labels:
    key_1: deployment-label
  annotations:
    key_2: deployment-annotation
spec:
  replicas: 3
  selector:
    matchLabels:
      key_3: pod-label
  template:
    metadata:
      labels:
        key_3: pod-label
      annotations:
        key_4: pod-annotation
    spec:
      containers:
        - name: nginx
          image: nginx:1.26.0
          ports:
            - containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 80
          resources:
            limits:
              memory: "50Mi"
              cpu: "250m"
            requests:
              memory: "50Mi"
              cpu: "250m"